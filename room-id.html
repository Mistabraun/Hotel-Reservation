<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Horizon | Room Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/room-id.css" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm py-3 bg-white bg-opacity-95">
        <div class="container">
            <a class="navbar-brand fw-bold" href="room.html">Grand Horizon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-3">
                    <li class="nav-item"><a class="nav-link" href="room.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="room.html#rooms">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="room.html#about">About</a></li>
                    <li class="nav-item"><a class="btn rounded-pill px-4" href="room.html#rooms" style="background-color: oklch(0.46 0.14 83); color: white; border: 1px solid oklch(0.46 0.14 83);">Book Now</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="pageContent" class="pt-5"></main>

    <footer class="footer-section py-5 bg-dark text-white">
        <div class="container">
            <div class="row gy-4">
                <div class="col-md-4">
                    <h5 class="footer-title">Grand Horizon</h5>
                    <p class="footer-text">Where elegance meets the shore. Enjoy a luxurious Malibu stay with premium amenities and personalized service.</p>
                </div>
                <div class="col-md-2">
                    <h6 class="footer-title">Explore</h6>
                    <ul class="footer-list">
                        <li><a href="room.html#rooms">Rooms</a></li>
                        <li><a href="room.html#about">About</a></li>
                    </ul>
                </div>
                <div class="col-md-3">
                    <h6 class="footer-title">Information</h6>
                    <ul class="footer-list">
                        <li><a href="#">About Us</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="col-md-3">
                    <h6 class="footer-title">Policies</h6>
                    <ul class="footer-list">
                        <li><a href="#">Cancellation</a></li>
                        <li><a href="#">Privacy</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const navbar = document.querySelector('.navbar');
        const setNavbarState = () => {
            if (navbar) {
                navbar.classList.toggle('scrolled', window.scrollY > 20);
            }
        };

        window.addEventListener('scroll', setNavbarState, { passive: true });
        setNavbarState();

        const rooms = [
            {
                id: 1,
                name: 'Classic Garden Room',
                type: 'Standard',
                price: 189,
                guests: 2,
                size: '320 sq ft',
                bed: '1 Queen Bed',
                description: 'Elegant and cozy room overlooking our serene garden courtyard. Features warm earth tones, handcrafted wooden furniture, and premium linens for a restful stay.',
                image: 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1400&q=80',
                amenities: ['Free Wi-Fi', 'Flat-screen TV', 'Mini Bar', 'Room Service', 'Air Conditioning', 'Coffee Maker'],
                highlights: ['Free cancellation up to 48 hours', 'Best rate guarantee', 'Complimentary Wi-Fi']
            },
            {
                id: 2,
                name: 'Deluxe Coastal Room',
                type: 'Deluxe',
                price: 320,
                guests: 2,
                size: '420 sq ft',
                bed: '1 King Bed',
                description: 'A generous room with panoramic sea views, soft neutral tones, and premium lounge seating designed for a calm and luxurious retreat.',
                image: 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=1400&q=80',
                amenities: ['Ocean View', 'Balcony', 'Spa Bath', 'Breakfast Included', 'Daily Housekeeping', 'Premium Toiletries'],
                highlights: ['Late check-out available', 'Breakfast included', 'Priority concierge']
            },
            {
                id: 3,
                name: 'Family Suite',
                type: 'Family',
                price: 260,
                guests: 4,
                size: '500 sq ft',
                bed: '2 Queen Beds',
                description: 'A spacious suite designed for flexibility, comfort, and memorable family stays with a dedicated lounge and thoughtful amenities.',
                image: 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1400&q=80',
                amenities: ['Breakfast', 'Living Area', 'Kid-friendly Setup', 'Laundry Service', 'High-Speed Wi-Fi', 'Room Service'],
                highlights: ['Interconnecting room option', 'Family welcome pack', 'Flexible bedding']
            },
            {
                id: 4,
                name: 'Ocean View Suite',
                type: 'Suite',
                price: 398,
                guests: 3,
                size: '620 sq ft',
                bed: '1 King Bed',
                description: 'An elevated suite with a lounge, soaking tub, and terrace views, combining luxury comfort with a dramatic coastal backdrop.',
                image: 'https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?auto=format&fit=crop&w=1400&q=80',
                amenities: ['Balcony', 'Soaking Tub', 'Ocean View', 'Butler Service', 'Lounge Seating', 'Premium Toiletries'],
                highlights: ['VIP welcome', 'Flexible check-in', 'Complimentary minibar']
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const roomId = Number(params.get('roomId'));
        const room = rooms.find(item => item.id === roomId);
        const pageContent = document.getElementById('pageContent');

        if (!room) {
            pageContent.innerHTML = `
                <section class="py-5">
                    <div class="container text-center py-5">
                        <h1 class="display-6 fw-bold">Room not found</h1>
                        <p class="text-muted">Please choose one of our available rooms from the rooms page.</p>
                        <a class="btn btn-room rounded-pill mt-3" href="room.html#rooms">Back to rooms</a>
                    </div>
                </section>
            `;
        } else {
            pageContent.innerHTML = `
                <section class="room-hero py-5">
                    <div class="container">
                        <nav aria-label="breadcrumb" class="mb-4">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="room.html">Home</a></li>
                                <li class="breadcrumb-item"><a href="room.html#rooms">Rooms</a></li>
                                <li class="breadcrumb-item active" aria-current="page">${room.name}</li>
                            </ol>
                        </nav>

                        <div class="row g-4 align-items-start">
                            <div class="col-lg-7">
                                <div class="image-card shadow-sm overflow-hidden rounded-4">
                                    <img src="${room.image}" alt="${room.name}" />
                                </div>
                            </div>
                            <div class="col-lg-5">
                                <div class="detail-card shadow-sm rounded-4 p-4 p-lg-5">
                                    <span class="room-tag">${room.type}</span>
                                    <h1 class="detail-title">${room.name}</h1>
                                    <p class="detail-intro">${room.description}</p>
                                    <div class="price-row d-flex align-items-center justify-content-between mb-4">
                                        <div>
                                            <p class="detail-price mb-0">$${room.price}</p>
                                            <span class="detail-price-label">per night</span>
                                        </div>
                                        <span class="detail-badge">Available now</span>
                                    </div>

                                    <div class="row g-3 mb-4">
                                        <div class="col-6">
                                            <div class="detail-stat">
                                                <span>Guests</span>
                                                <strong>${room.guests}</strong>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="detail-stat">
                                                <span>Size</span>
                                                <strong>${room.size}</strong>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="detail-stat">
                                                <span>Bed</span>
                                                <strong>${room.bed}</strong>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="detail-stat">
                                                <span>Rating</span>
                                                <strong>4.9/5</strong>
                                            </div>
                                        </div>
                                    </div>

                                    <a href="#" class="btn btn-room w-100 rounded-pill mb-3">Book Now</a>
                                    <div class="detail-perks">
                                        ${room.highlights.map(item => `<div><i class="fa-solid fa-check me-2"></i>${item}</div>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4 mt-3">
                            <div class="col-lg-8">
                                <div class="detail-card rounded-4 p-4 p-lg-5 shadow-sm">
                                    <h2 class="detail-section-title">Amenities</h2>
                                    <div class="d-flex flex-wrap gap-2 mt-3">
                                        ${room.amenities.map(item => `<span class="detail-chip">${item}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="detail-card rounded-4 p-4 shadow-sm">
                                    <h2 class="detail-section-title">Why guests love it</h2>
                                    <ul class="detail-list mt-3">
                                        <li>Private and quiet environment</li>
                                        <li>Thoughtful luxury touches</li>
                                        <li>Perfect balance of comfort and style</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5">
                            <h2 class="section-title text-center mb-4">Explore more rooms</h2>
                            <div class="row g-4 row-cols-1 row-cols-md-2 row-cols-xl-3">
                                ${rooms.filter(item => item.id !== room.id).map(item => `
                                    <article class="col">
                                        <div class="card room-card h-100 overflow-hidden">
                                            <img src="${item.image}" class="card-img-top" alt="${item.name}">
                                            <div class="card-body">
                                                <span class="room-tag">${item.type}</span>
                                                <h3 class="room-title">${item.name}</h3>
                                                <p class="room-price">$${item.price} <span>/ night</span></p>
                                                <a href="room-id.html?roomId=${item.id}" class="btn btn-room rounded-pill">View details</a>
                                            </div>
                                        </div>
                                    </article>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }
    </script>
</body>
</html>
